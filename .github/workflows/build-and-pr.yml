name: Build & Open Deploy PR

on:
  push:
    branches:
      - setup

jobs:
  build-and-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout setup branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (transpile JSX to JS)
        run: npm run build

      - name: Push built files to deploy-preview branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          COMMIT_SHA=$(git rev-parse --short HEAD)

          # Save built files before switching branches
          cp -r dist /tmp/dist

          # Create/reset deploy-preview from main so the PR can be created
          git fetch origin main
          git checkout -B deploy-preview origin/main
          git rm -rf . --quiet

          # Copy built files to root
          cp -r /tmp/dist/. .

          git add -A
          if git diff --staged --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "build: transpile from setup @ $COMMIT_SHA"
            git push origin deploy-preview --force
          fi

      - name: Create or update PR to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --base main --head deploy-preview --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -z "$EXISTING" ]; then
            PR_BODY="Automated deploy PR — gerado pelo workflow de build do branch \`setup\`.\n\n- JSX transpilado via Babel (sem Babel standalone no browser)\n- Assets copiados: \`components/\`, \`assets/\`, \`fonts/\`, \`colors_and_type.css\`, \`CNAME\`\n\n**Merge para fazer o deploy no GitHub Pages.**"
            gh pr create \
              --title "deploy: transpiled build from setup" \
              --body "$PR_BODY" \
              --base main \
              --head deploy-preview
          else
            echo "PR #$EXISTING ja existe - build atualizado."
          fi
