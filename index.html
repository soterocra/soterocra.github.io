<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>soterocra.dev — Rafael Sotero</title>

<style>
  html, body { margin: 0; background: var(--bg); color: var(--fg-1); min-height: 100vh; }
  body { font-family: var(--font-ui); }
  * { box-sizing: border-box; }

  /* Scroll smoothing */
  html { scroll-behavior: smooth; scroll-padding-top: 80px; }

  /* Cursor blink — the brand "breath" */
  @keyframes blink { 0%, 49% { opacity: 1 } 50%, 100% { opacity: 0 } }
  .cursor-blink { animation: blink 1.06s steps(1, end) infinite; }

  /* Hover states */
  .article-row:hover h3 { color: var(--accent); }
  .article-row:hover .arrow { color: var(--accent); transform: translate(2px, -2px); }
  .article-row { transition: background-color .18s; }
  .article-row:hover { background-color: var(--bg-subtle); }

  .project-card:hover { border-color: var(--accent); }
  .project-card:hover .proj-arrow { color: var(--accent); transform: translate(2px, -2px); }

  .contrib-row:hover { border-color: var(--accent); }
  .social-row:hover { border-color: var(--accent); }
  .social-featured:hover { border-color: #0A66C2; }

  ::selection { background: var(--accent-soft); color: var(--fg-1); }

  /* Dot grid background — subtle workflow-canvas vibe */
  .dot-grid {
    background-image: radial-gradient(circle, color-mix(in srgb, var(--fg-3) 25%, transparent) 1px, transparent 1px);
    background-size: 24px 24px;
    background-position: 0 0;
  }

  /* ===== RESPONSIVE — smartphones & tablets ===== */
  /* Tablet & below */
  @media (max-width: 900px) {
    section { padding-left: 20px !important; padding-right: 20px !important; }
    /* Hero: stack photo below */
    section[id="sobre"] {
      grid-template-columns: 1fr !important;
      gap: 32px !important;
      padding-top: 56px !important;
      padding-bottom: 40px !important;
    }
    section[id="sobre"] h1 { font-size: 40px !important; }
    section[id="sobre"] img { width: 100% !important; max-width: 320px; height: auto !important; aspect-ratio: 4/5; }
    section[id="sobre"] > div:last-child { justify-self: start !important; }

    /* Section titles */
    section h2 { font-size: 26px !important; }

    /* Projects grid: 2 columns at tablet */
    .project-grid { grid-template-columns: repeat(2, 1fr) !important; }

    /* Contributions: 1 column */
    .contrib-grid { grid-template-columns: 1fr !important; }

    /* Stack: 2 columns */
    .stack-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 20px !important; }

    /* Certs: 1 column */
    .certs-grid { grid-template-columns: 1fr !important; }

    /* Social: stack */
    .social-grid { grid-template-columns: 1fr !important; }
  }

  /* Phone */
  @media (max-width: 640px) {
    html { scroll-padding-top: 64px; }

    /* Nav: compact */
    nav { gap: 10px !important; padding: 10px 16px !important; flex-wrap: wrap; }
    nav > a:first-child { font-size: 16px !important; }
    nav > a:first-child img { width: 32px !important; height: 32px !important; }
    /* Hide section anchor links on phone — keep wordmark + utility buttons */
    nav .nav-links { display: none !important; }
    nav button { padding: 5px 8px !important; font-size: 11px !important; }

    /* Hero */
    section[id="sobre"] h1 { font-size: 34px !important; }
    section[id="sobre"] p { font-size: 16px !important; }

    /* Section heads stack */
    .section-head { flex-direction: column !important; align-items: flex-start !important; gap: 12px !important; }

    /* Articles list: cleaner mobile layout */
    .article-row {
      grid-template-columns: 1fr !important;
      gap: 8px !important;
      padding: 18px 4px !important;
    }
    .article-row .meta-row {
      display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
      font-size: 11px;
    }
    .article-row .arrow { display: none !important; }

    /* Projects: single column */
    .project-grid { grid-template-columns: 1fr !important; }

    /* Stack: 2 cols stays, smaller */
    .stack-grid { grid-template-columns: 1fr 1fr !important; gap: 16px !important; }

    /* Section dividers padding */
    section { padding-top: 48px !important; padding-bottom: 48px !important; }

    /* Contrib row */
    .contrib-row {
      grid-template-columns: auto 1fr !important;
      gap: 12px !important;
      padding: 14px 16px !important;
    }
    .contrib-row > div:last-child { display: none !important; }

    /* Social featured stacks */
    .social-featured { padding: 22px !important; }
    .social-featured h3 { font-size: 22px !important; }

    /* Footer stack */
    footer { grid-template-columns: 1fr !important; text-align: center !important; gap: 6px !important; }
    footer span { text-align: center !important; }
  }
</style>
